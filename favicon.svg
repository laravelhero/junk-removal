    <path d="M44 23 h6.5 a2 2 0 0 1 1.7 1 L57 31.5 a3 3 0 0 1 .5 1.7 V41 H44 Z"/>
    <!-- wheels -->
    <circle cx="19" cy="45" r="6"/>
    <circle cx="45" cy="45" r="6"/>
  </g>
  <!-- cab window + wheel hubs in amber -->
  <g fill="#f59e0b">
    <path d="M46 26.5 h4 l3 4.2 h-7 Z"/>
    <circle cx="19" cy="45" r="2.2"/>
    <circle cx="45" cy="45" r="2.2"/>
